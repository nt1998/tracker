    <title>Tracker</title>
    <style>
      :root { --boot-bg: #1e1e2e; --boot-fg: #cdd6f4; }
      html[data-theme="light"] { --boot-bg: #eff1f5; --boot-fg: #4c4f69; }
      html, body { background: var(--boot-bg); color: var(--boot-fg); margin: 0; height: 100%; }
      #root { min-height: 100%; background: var(--boot-bg); }
    </style>
    <script>
      // Apply theme before paint to avoid a flash.
      try {
        var t = localStorage.getItem('tracker_theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    </script>
